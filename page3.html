<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>物件紹介</title>

  <style>
    body {
      background-color: #cfeeee;
      color: #333;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      text-align: center;
      padding: 50px 0;
    }

    .property {
      display: flex;
      align-items: flex-start;
      justify-content: center;
      gap: 30px;
      margin: 50px auto;
      max-width: 900px;
    }

    .property-img {
      width: 400px;
      height: auto;
      object-fit: cover;
    }

    .property-text {
      max-width: 400px;
      text-align: left;
    }

  </style>
</head>

<body>

<!-- Aタイプ -->
<div class="property">
  <img src="IMG_20260429_162434.png" class="property-img">

  <div class="property-text">
    <h2>Aタイプ（弋が丘団地）</h2>
    <p>
      一定期間の移住を経て、問題行動が確認されなかった個体が移送される団地です。Bタイプよりも安全性・防音性ともに優れています。
    </p>
  </div>
</div>

<!-- Cタイプ（←これ追加） -->
<div class="property">
  <img src="IMG_20260429_162447.png" class="property-img">

  <div class="property-text">
    <h2>Cタイプ（弋せせらぎ団地）</h2>
    <p>
      他の住民の安全確保のため、Bタイプに移送できない個体を収容する施設です。配給場所からは離れていますが、食事は各部屋の玄関先に設置された配給ボックスへ届けられます。
    </p>
  </div>
</div>

<div class="extra-text">
  <h2>Bタイプ（弋ふるさと団地）</h2>
  <p>
    移住確定後、最初に移送される団地です。安全性はAタイプに比べてやや劣りますが、安心して暮らして頂けます。　　　　　　　　　Aタイプと同じ種類の建物です。
  </p>
</div>

</body>
</html>
