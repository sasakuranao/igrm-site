<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>移行手続き</title>

  <style>
    body {
      background: linear-gradient(#cfeeee, #a8d5d5);
      color: #333;
      font-family: "Hiragino Kaku Gothic ProN", "Noto Sans JP", sans-serif;
      text-align: center;
      padding-top: 20%;
    }

    .title {
      font-family: "MS Gothic", "Osaka-Mono", monospace;
      letter-spacing: 1px;
      font-weight: normal;
    }

    .btn {
      display: inline-block;
      margin-top: 30px;
      padding: 10px 20px;
      border: 1px solid #333;
      text-decoration: none;
      color: #333;
      transition: 0.3s;
      opacity: 0.8;
    }

    .btn:hover {
      background-color: #333;
      color: #fff;
      opacity: 1;
    }
  </style>

</head>

<body>

<h1 class="title">ようこそ</h1>
<p>尤街があなたを待っています。</p>

<a href="#" class="btn">ごめんね</a>

</body>
</html>
